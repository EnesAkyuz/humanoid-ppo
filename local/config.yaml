# Humanoid-v5 PPO — Local M4 Mac Configuration
# Based on RL Baselines3 Zoo Optuna-tuned hyperparameters

env:
  id: "Humanoid-v5"
  n_envs: 8
  kwargs:
    forward_reward_weight: 1.25
    ctrl_cost_weight: 0.1
    contact_cost_weight: 5.0e-7
    healthy_reward: 5.0
    terminate_when_unhealthy: true
    healthy_z_range: [1.0, 2.0]
    reset_noise_scale: 0.01
    exclude_current_positions_from_observation: true

train:
  total_timesteps: 50_000_000
  learning_rate: 3.57e-5
  n_steps: 512
  batch_size: 256
  n_epochs: 5
  gamma: 0.95
  gae_lambda: 0.9
  clip_range: 0.3
  ent_coef: 0.00238
  vf_coef: 0.43
  max_grad_norm: 2
  normalize: true
  policy_kwargs:
    net_arch:
      pi: [256, 256]
      vf: [256, 256]
    activation_fn: "ReLU"
    log_std_init: -2
    ortho_init: false

eval:
  eval_freq: 50_000
  n_eval_episodes: 10

paths:
  checkpoints: "checkpoints"
  logs: "logs"
  videos: "videos"
