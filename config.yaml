# Humanoid-v5 PPO — Lambda GPU Configuration (MJX + Brax)
# GPU-accelerated physics + training, fully on-device
# Expect ~6 min for 20M steps, ~30 min for 100M steps on A100

env:
  forward_reward_weight: 1.25
  ctrl_cost_weight: 0.1
  healthy_reward: 5.0
  healthy_z_range: [1.0, 2.0]
  reset_noise_scale: 0.01
  exclude_current_positions_from_observation: true
  episode_length: 1000

train:
  num_timesteps: 500_000_000
  num_envs: 4096
  learning_rate: 3.0e-5
  unroll_length: 10
  batch_size: 512
  num_minibatches: 24
  num_updates_per_batch: 8
  discounting: 0.97
  gae_lambda: 0.95
  entropy_cost: 1.0e-3
  clipping_epsilon: 0.3
  max_grad_norm: 1.0
  normalize_observations: true
  reward_scaling: 0.05
  num_evals: 50
  seed: 0
  policy_hidden_layer_sizes: [256, 256]

paths:
  checkpoints: "checkpoints"
  logs: "logs"
